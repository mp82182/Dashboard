name: Update watchlist

on:
  schedule:
    - cron: "30 22 * * 1-5"   # weekdays ~5:30-6:30pm ET, after market close
  workflow_dispatch: {}        # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run EMA updater
        run: python3 scripts/update_watchlist.py

      - name: Commit changes
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@github.com"
          git add data/watchlist.json
          git diff --cached --quiet || git commit -m "Update watchlist data"
          git push
